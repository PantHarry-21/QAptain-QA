# QAptain — Local Development Infrastructure
# Starts: PostgreSQL, Redis (ChromaDB removed — using Supabase for vector memory)
# Run apps separately:
#   Backend:  cd backend && .venv/bin/python -m uvicorn main:app --reload --port 8000
#   Frontend: cd frontend && npm run dev

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: qaptain
      POSTGRES_PASSWORD: qaptain
      POSTGRES_DB: qaptain
    ports:
      - "5432:5432"
    volumes:
      - qaptain_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qaptain"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - qaptain_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  qaptain_pg:
  qaptain_redis:
