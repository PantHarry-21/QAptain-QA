# QAPtain local stack — PostgreSQL, Redis (Supabase replaces ChromaDB)
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: qaptain
      POSTGRES_PASSWORD: qaptain
      POSTGRES_DB: qaptain
    ports:
      - "5432:5432"
    volumes:
      - qaptain_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - qaptain_redis:/data

volumes:
  qaptain_pg:
  qaptain_redis:

